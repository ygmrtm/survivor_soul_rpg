services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-ygmrtm/survivor_soul_rpg}:${APP_VERSION:-latest}
    container_name: survivor-soul-rpg
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      PORT: "5000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/api/adventure/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
