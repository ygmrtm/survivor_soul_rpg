name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type (patch, minor, major, or none)
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - none
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: .
          REDIS_URL: redis://default:wFtQct1i9HcqUv2XawZuekyfb8knN5NS@redis-18454.c238.us-central1-2.gce.redns.redis-cloud.com:18454/0
        run: pytest backend/test/ -q

  release:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            current="$(cat VERSION.txt)"
            IFS='.' read -r major minor patch <<< "${current}"
            case "${{ github.event.inputs.bump }}" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
              none) ;;
            esac
            version="${major}.${minor}.${patch}"
            if [[ "${{ github.event.inputs.bump }}" != "none" ]]; then
              echo "${version}" > VERSION.txt
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add VERSION.txt
              git commit -m "chore(release): v${version} [skip ci]"
              git tag "v${version}"
              git push origin HEAD:main --tags
            fi
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.ghcr.yml,docker-compose.yml,scripts/deploy.sh,.env.example,app.env.example"
          target: /opt/survivor-soul-rpg

      - name: Deploy on production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/survivor-soul-rpg
            chmod +x scripts/deploy.sh
            export GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}"
            export GHCR_USERNAME="${{ github.repository_owner }}"
            ./scripts/deploy.sh "${{ needs.release.outputs.version }}"
