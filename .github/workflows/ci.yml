name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: .
          REDIS_URL: redis://default:wFtQct1i9HcqUv2XawZuekyfb8knN5NS@redis-18454.c238.us-central1-2.gce.redns.redis-cloud.com:18454/0
        run: pytest backend/test/ -q
